<!doctype html>
<html>

<head>
	<meta charset="utf-8">
	<title>Click Button to Proceed!</title>
	<meta name="description" content="Informed consent form for the online test.">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="vu-consentform.css">
	<script>
		var test_url = 'http://oplab.barrios.io/oplab/62bb2046ac239b643f07ac83/execute?mode=live&nextType=HIT&nextID=64000c8378b8ad252b8e8be0&stimuliFolderID=64000c0d78b8ad252b8e8bdf';
		if (window.location.search.length > 0) {
			test_url = test_url + (test_url.includes('?') ? '&' : '?') + window.location.search.substring(1);
		}
		function accept_clicked() { location.href = test_url; }
	</script>
</head>

<body>
	<div id="for-desktop" style="display: none;">
		<div class="wrapper">
			<button type="button" onClick="accept_clicked()">Click to Proceed!</button>
		</div>
	</div>

	<div id="for-mobile" style="display: none;">
		<div class="wrapper">
			<p>This online test is not suitable for mobile devices. Please access this page on your desktop or laptop
				computer.</p>
		</div>
	</div>

	<script src="mobile-detect.min.js"></script>
	<script>
		var detector = new MobileDetect(window.navigator.userAgent);
		var div_id = (detector.mobile() == null ? "for-desktop" : "for-mobile");
		document.addEventListener("DOMContentLoaded", function (e) {
			document.getElementById(div_id).style.display = "block";
		});
	</script>
</body>

</html>
